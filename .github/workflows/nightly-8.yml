---
name: "nightly-8"
on:
    schedule:
        - cron: '42 5 * * *'
    workflow_dispatch:

jobs:
    nightly-8:
        name: "dispatch-nightly-8"
        runs-on: ubuntu-24.04
        permissions:
            actions: write
        steps:
            - name: Checkout '8'
              uses: actions/checkout@v6
              with:
                  ref: '8'

            - name: Execute 'ci.yml' on '8'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh workflow run ci.yml --ref 8
